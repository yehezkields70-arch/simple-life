<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Life — Pengingat Kesehatan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px; background: var(--green);
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  .top-actions { display: flex; gap: 8px; align-items: center; }
  .notif-btn {
    background: none; border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
    color: var(--text-muted); transition: all 0.15s;
  }
  .notif-btn:hover { background: var(--bg); color: var(--text); }

  /* Main */
  .main { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  /* Toast */
  .toast {
    display: none; position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: white; padding: 10px 20px; border-radius: 30px;
    font-size: 14px; font-weight: 500; z-index: 200; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(29,158,117,0.35); animation: slideDown 0.2s ease;
  }
  .toast.show { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* Stats */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num { font-size: 28px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* Section */
  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }

  /* Add button */
  .add-btn {
    width: 100%; padding: 13px; border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius); background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
    margin-bottom: 1.5rem; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .add-btn:hover { background: var(--surface); color: var(--text); border-color: var(--green); }
  .add-btn .plus { font-size: 18px; color: var(--green); font-weight: 300; }

  /* Reminder list */
  .list { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow); transition: all 0.15s; animation: fadeIn 0.2s ease;
  }
  .card:hover { border-color: var(--border-strong); }
  .card.alarm-on { border-left: 3px solid var(--green); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px; font-weight: 500; color: var(--text);
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .cat-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 400;
  }
  .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: none; cursor: pointer; padding: 7px 8px;
    border-radius: var(--radius-sm); font-size: 15px; color: var(--text-muted);
    transition: all 0.12s;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.del:hover { background: #FCEBEB; color: #E24B4A; }

  /* Empty */
  .empty {
    text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px;
    background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center; padding: 1rem;
    backdrop-filter: blur(2px);
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 1.75rem;
    width: min(460px, 100%); max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15); animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(8px); } to { opacity: 1; transform: none; } }

  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .modal-header h2 { font-size: 18px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted); padding: 4px; border-radius: 6px; }
  .modal-close:hover { background: var(--bg); }

  .field { margin-bottom: 1.1rem; }
  .field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .field input, .field select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; transition: border 0.15s;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
  }
  .field input.error { border-color: #E24B4A; box-shadow: 0 0 0 3px rgba(226,75,74,0.1); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-wrap { position: relative; display: inline-block; width: 40px; height: 22px; cursor: pointer; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-sw {
    position: absolute; inset: 0; background: var(--border-strong);
    border-radius: 22px; transition: 0.2s;
  }
  .toggle-sw:before {
    content: ''; position: absolute; width: 16px; height: 16px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s;
  }
  input:checked + .toggle-sw { background: var(--green); }
  input:checked + .toggle-sw:before { transform: translateX(18px); }

  .modal-footer { display: flex; gap: 8px; margin-top: 1.5rem; }
  .btn-primary {
    flex: 1; padding: 11px; border-radius: var(--radius-sm); border: none;
    background: var(--green); color: white;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-cancel {
    padding: 11px 18px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong); background: transparent;
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--bg); color: var(--text); }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tab {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-strong);
    background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text-muted); cursor: pointer; transition: all 0.12s;
  }
  .tab.active { background: var(--green); color: white; border-color: var(--green); }
  .tab:hover:not(.active) { background: var(--bg); color: var(--text); }

  /* Alarm notification banner */
  .alarm-banner {
    display: none; position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--green);
    border-radius: var(--radius); padding: 14px 18px; max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 300;
    animation: slideUp 0.3s ease;
  }
  .alarm-banner.show { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  .alarm-banner-title { font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 4px; }
  .alarm-banner-body { font-size: 14px; color: var(--text); margin-bottom: 10px; }
  .alarm-close { font-size: 12px; color: var(--text-muted); cursor: pointer; text-decoration: underline; }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-num { font-size: 22px; }
    .modal { padding: 1.25rem; }
    .alarm-banner { right: 12px; bottom: 12px; left: 12px; max-width: none; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-text">Simple Life</div>
      <div class="logo-sub">health reminder</div>
    </div>
  </div>
  <div class="top-actions">
    <button class="notif-btn" onclick="requestNotif()">🔔 Aktifkan notifikasi</button>
  </div>
</div>

<div class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">Total reminder</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="s-aktif">0</div>
      <div class="stat-label">Alarm aktif</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="s-hari">0</div>
      <div class="stat-label">Hari ini</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Semua Reminder</span>
  </div>

  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('semua',this)">Semua</button>
    <button class="tab" onclick="setFilter('air',this)">💧 Minum air</button>
    <button class="tab" onclick="setFilter('olah',this)">🏃 Olahraga</button>
    <button class="tab" onclick="setFilter('tidur',this)">😴 Tidur</button>
    <button class="tab" onclick="setFilter('makan',this)">🥗 Makan sehat</button>
    <button class="tab" onclick="setFilter('lain',this)">📌 Lainnya</button>
  </div>

  <button class="add-btn" onclick="openModal()">
    <span class="plus">+</span> Tambah reminder baru
  </button>

  <div class="list" id="list"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="handleBgClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Tambah reminder</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field">
      <label>Judul reminder</label>
      <input type="text" id="f-title" placeholder="Contoh: Minum 8 gelas air">
    </div>
    <div class="field">
      <label>Kategori</label>
      <select id="f-cat">
        <option value="air">💧 Minum air</option>
        <option value="olah">🏃 Olahraga</option>
        <option value="tidur">😴 Tidur</option>
        <option value="makan">🥗 Makan sehat</option>
        <option value="lain">📌 Lainnya</option>
      </select>
    </div>
    <div class="field">
      <label>Waktu alarm</label>
      <input type="time" id="f-time" value="07:00">
    </div>
    <div class="field">
      <label>Frekuensi</label>
      <select id="f-freq">
        <option value="Setiap hari">Setiap hari</option>
        <option value="Senin–Jumat">Senin–Jumat</option>
        <option value="Akhir pekan">Akhir pekan</option>
        <option value="Sekali">Sekali</option>
      </select>
    </div>
    <div class="field">
      <div class="toggle-row">
        <label style="margin:0">Aktifkan alarm</label>
        <label class="toggle-wrap">
          <input type="checkbox" id="f-alarm" checked>
          <span class="toggle-sw"></span>
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-primary" onclick="saveReminder()">Simpan reminder</button>
    </div>
  </div>
</div>

<!-- Alarm popup -->
<div class="alarm-banner" id="alarm-banner">
  <div class="alarm-banner-title">⏰ Waktunya!</div>
  <div class="alarm-banner-body" id="alarm-text">Minum air putih</div>
  <span class="alarm-close" onclick="closeAlarm()">Tutup</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CAT = {
  air:  { label: '💧 Minum air',   color: '#1D9E75', bg: '#E1F5EE', text: '#0F6E56' },
  olah: { label: '🏃 Olahraga',    color: '#378ADD', bg: '#E6F1FB', text: '#185FA5' },
  tidur:{ label: '😴 Tidur',       color: '#7F77DD', bg: '#EEEDFE', text: '#534AB7' },
  makan:{ label: '🥗 Makan sehat', color: '#BA7517', bg: '#FAEEDA', text: '#854F0B' },
  lain: { label: '📌 Lainnya',     color: '#888780', bg: '#F1EFE8', text: '#5F5E5A' },
};

let reminders = JSON.parse(localStorage.getItem('sl-v2') || '[]');
let editId = null;
let activeFilter = 'semua';
let alarmTimers = [];

function save() { localStorage.setItem('sl-v2', JSON.stringify(reminders)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function requestNotif() {
  if (!('Notification' in window)) { showToast('Browser tidak support notifikasi'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') showToast('Notifikasi diaktifkan!');
    else showToast('Notifikasi ditolak');
  });
}

function render() {
  const filtered = activeFilter === 'semua' ? reminders : reminders.filter(r => r.cat === activeFilter);
  const list = document.getElementById('list');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div>${activeFilter === 'semua' ? 'Belum ada reminder.<br>Tambah yang pertama!' : 'Tidak ada reminder di kategori ini.'}</div>`;
  } else {
    list.innerHTML = filtered.map(r => {
      const c = CAT[r.cat];
      return `<div class="card ${r.alarm ? 'alarm-on' : ''}">
        <div class="cat-dot" style="background:${c.color}"></div>
        <div class="card-info">
          <div class="card-title">
            ${r.title}
            <span class="cat-badge" style="background:${c.bg};color:${c.text}">${c.label}</span>
          </div>
          <div class="card-meta">${r.time} &middot; ${r.freq}${r.alarm ? ' &middot; alarm aktif' : ''}</div>
        </div>
        <div class="card-actions">
          <button class="icon-btn" onclick="toggleAlarm('${r.id}')" title="Toggle alarm">${r.alarm ? '🔔' : '🔕'}</button>
          <button class="icon-btn" onclick="editReminder('${r.id}')" title="Edit">✏️</button>
          <button class="icon-btn del" onclick="deleteReminder('${r.id}')" title="Hapus">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }
  updateStats();
  scheduleAlarms();
}

function updateStats() {
  document.getElementById('s-total').textContent = reminders.length;
  document.getElementById('s-aktif').textContent = reminders.filter(r => r.alarm).length;
  const day = new Date().getDay();
  document.getElementById('s-hari').textContent = reminders.filter(r => {
    if (r.freq === 'Setiap hari') return true;
    if (r.freq === 'Senin–Jumat') return day >= 1 && day <= 5;
    if (r.freq === 'Akhir pekan') return day === 0 || day === 6;
    return false;
  }).length;
}

function scheduleAlarms() {
  alarmTimers.forEach(clearTimeout); alarmTimers = [];
  reminders.filter(r => r.alarm).forEach(r => {
    const [h, m] = r.time.split(':').map(Number);
    const now = new Date(), target = new Date();
    target.setHours(h, m, 0, 0);
    if (target <= now) target.setDate(target.getDate() + 1);
    const diff = target - now;
    if (diff < 86400000) {
      alarmTimers.push(setTimeout(() => fireAlarm(r), diff));
    }
  });
}

function fireAlarm(r) {
  document.getElementById('alarm-text').textContent = r.title;
  document.getElementById('alarm-banner').classList.add('show');
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Simple Life ⏰', { body: 'Waktunya: ' + r.title });
  }
  setTimeout(closeAlarm, 10000);
}

function closeAlarm() { document.getElementById('alarm-banner').classList.remove('show'); }

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function openModal(reset = true) {
  if (reset) {
    editId = null;
    document.getElementById('modal-title').textContent = 'Tambah reminder';
    document.getElementById('f-title').value = '';
    document.getElementById('f-title').classList.remove('error');
    document.getElementById('f-cat').value = 'air';
    document.getElementById('f-time').value = '07:00';
    document.getElementById('f-freq').value = 'Setiap hari';
    document.getElementById('f-alarm').checked = true;
  }
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function handleBgClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

function saveReminder() {
  const title = document.getElementById('f-title').value.trim();
  const titleEl = document.getElementById('f-title');
  if (!title) { titleEl.classList.add('error'); titleEl.focus(); return; }
  titleEl.classList.remove('error');

  const data = {
    id: editId || Date.now().toString(),
    title,
    cat: document.getElementById('f-cat').value,
    time: document.getElementById('f-time').value,
    freq: document.getElementById('f-freq').value,
    alarm: document.getElementById('f-alarm').checked,
  };

  if (editId) {
    reminders = reminders.map(r => r.id === editId ? data : r);
    showToast('Reminder diperbarui!');
  } else {
    reminders.push(data);
    showToast('Reminder ditambahkan!');
  }

  save(); render(); closeModal();
}

function editReminder(id) {
  const r = reminders.find(x => x.id === id); if (!r) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit reminder';
  document.getElementById('f-title').value = r.title;
  document.getElementById('f-title').classList.remove('error');
  document.getElementById('f-cat').value = r.cat;
  document.getElementById('f-time').value = r.time;
  document.getElementById('f-freq').value = r.freq;
  document.getElementById('f-alarm').checked = r.alarm;
  openModal(false);
}

function deleteReminder(id) {
  if (!confirm('Hapus reminder ini?')) return;
  reminders = reminders.filter(r => r.id !== id);
  save(); render(); showToast('Reminder dihapus');
}

function toggleAlarm(id) {
  reminders = reminders.map(r => r.id === id ? { ...r, alarm: !r.alarm } : r);
  save(); render();
  const r = reminders.find(x => x.id === id);
  showToast(r.alarm ? 'Alarm diaktifkan' : 'Alarm dimatikan');
}

render();
</script>
</body>
</html>
